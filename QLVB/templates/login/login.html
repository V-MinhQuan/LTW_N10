{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Vietasia Travel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            height: 100vh;
            width: 100%;
            background: url("{% static 'img/bg_login.png' %}") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            text-align: center;
            margin-top: 60px;
            width: 100%;
        }

        .logo-vietasia {
            width: 650px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .login-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-grow: 1;
            padding-right: 12%;
            padding-bottom: 50px;
        }

        .login-card {
            width: 480px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 50px 45px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 15px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }
        .form-input:focus { border-color: #00adef; box-shadow: 0 0 5px rgba(0,173,239,0.4); }

        /* Tối ưu vị trí nút Hiện/Ẩn */
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        #togglePassword {
            position: absolute;
            right: 15px;
            color: #555;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            user-select: none; /* Ngăn bôi xanh chữ khi click nhanh */
            z-index: 10;
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .footer-links a { color: #008080; text-decoration: none; font-weight: 500; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: #00adef;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #008ec4; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="{% static 'img/logo_login.png' %}" alt="Vietasia Travel" class="logo-vietasia">
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <form method="POST">
                {% csrf_token %}

                {% if form.errors %}
                    <p style="color: red; text-align: center; margin-bottom: 15px; font-weight: bold; font-size: 15px;">Sai tài khoản hoặc mật khẩu!</p>
                {% endif %}

                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" class="form-input" required>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="password-container">
                        <input type="password" name="password" id="passwordInput" class="form-input" required>
                        <span id="togglePassword">Hiện</span>
                    </div>
                </div>

               <div class="footer-links">
    <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" name="remember_me"> Ghi nhớ đăng nhập
    </label>
    <a href="{% url 'quen_mat_khau' %}">Quên mật khẩu?</a>
</div>

                <button type="submit" class="btn-submit">Đăng nhập</button>
            </form>
        </div>
    </div>

<script>
    // Đảm bảo script nằm ở cuối để các phần tử HTML đã load xong
    const passwordInput = document.getElementById('passwordInput');
    const togglePassword = document.getElementById('togglePassword');

    togglePassword.addEventListener('click', function() {
        // Kiểm tra loại input hiện tại
        const isPassword = passwordInput.getAttribute('type') === 'password';

        // Thay đổi type: nếu là password thì đổi thành text và ngược lại
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

        // Cập nhật nội dung chữ
        this.textContent = isPassword ? 'Ẩn' : 'Hiện';
    });
</script>
</body>
</html>
