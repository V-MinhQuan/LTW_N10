{% extends "base.html" %}
{% load static %}

{% block title %}Phân công - Vietasia Travel{% endblock %}

{% block extra_css %}
<style>
/* CSS CÒN LẠI CHO LAYOUT */
.page-container { max-width: 900px; margin: 30px auto; background: white; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
.page-header { background-color: #7DCCF1; padding: 15px 20px; font-weight: bold; font-size: 16px; color: #333; border-bottom: 1px solid #ddd; }
.page-content { padding: 30px 40px; }
.form-group-row { display: flex; gap: 30px; margin-bottom: 20px; }
.form-group { flex: 1; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
.form-group label { width: 150px; font-size: 14px; flex-shrink: 0; }
.form-group label span.required { color: red; }
textarea.form-control { height: 120px; resize: vertical; }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 30px; }
</style>
{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">Phân công xử lý văn bản</div>
    <div class="page-content">
        <div class="form-group-row">
            <div class="form-group">
                <label>Trích yếu</label>
                <input type="text" class="form-control" value="Thông báo điều chỉnh giá tour..." readonly>
            </div>
            <div class="form-group">
                <label>Người xử lý (<span class="required">*</span>)</label>
                <select class="form-control">
                    <option>--- Chọn người xử lý ---</option>
                    <option>Nguyễn Văn A</option>
                    <option>Lê Thị H</option>
                </select>
            </div>
        </div>
        
        <div class="form-group-row">
            <div class="form-group">
                <label>Số ký hiệu</label>
                <input type="text" class="form-control" value="04/HD-DL" readonly>
            </div>
            <div class="form-group">
                <label>Thời hạn xử lý (<span class="required">*</span>)</label>
                <input type="date" class="form-control">
            </div>
        </div>
        
        <div class="form-group full-width" style="flex-direction: column;">
            <label style="margin-bottom: 10px; font-weight: bold;">Ghi chú</label>
            <textarea class="form-control" placeholder="Nhập ghi chú nếu có"></textarea>
        </div>

        <div class="form-actions">
            <a href="{% url 'xlvb_index' %}" class="btn btn-gray">Hủy</a>
            <a href="{% url 'xlvb_index' %}" class="btn btn-primary">Phân công</a>
        </div>
    </div>
</div>
{% endblock %}
